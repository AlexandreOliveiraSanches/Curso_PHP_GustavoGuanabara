<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informações Pessoais</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>
    <div class="terminal">
        <div class="conteudo">
            <a href="../index.php">Voltar</a>
            <form method="get" action="dado.php">
                <p>
                    Nome <input type="text" name="nome" required>
                </p>
                <p>
                    Ano de Nascimento <input type="number" min="1900" max="2100" name="anoNasc" placeholder="Ano" required>
                </p>
                <fieldset><legend>Sexo</legend>
                    <input type="radio" name="sexo" id="masc" value="Masculino">
                    <label for="masc">Masculino</label><br/>
                    <input type="radio" name="sexo" id="femi" value="Feminino">
                    <label for="femi">Feminino</label><br/>
                    <input type="radio" name="sexo" id="nInf" value="Não informado">
                    <label for="nInf">Prefiro não dizer</label>
                </fieldset><br/>
                <label for="itam">Tamanho</label>
                <select name="tam" id="itam">
                    <option value="8pt">8</option>
                    <option value="10pt">10</option>
                    <option value="14pt">14</option>
                    <option value="20pt">20</option>
                    <option value="40pt">40</option>
                </select><br/>
                <label for="icor">Cor: </label>
                <input type="color" name="cor" id="icor"><br/>
                
                <input type="submit" name="Enviar">
            </form>
             </br>
            
        </div>
    </div>
</body>
</html>
